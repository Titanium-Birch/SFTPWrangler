version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
      timezone: "UTC"
    open-pull-requests-limit: 1
    groups:
      all-python-dependencies:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(deps)"
